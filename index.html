<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>English Daily</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--accent:#3b82f6;--accent2:#8b5cf6;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
.header{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.streak-badge{display:flex;align-items:center;gap:4px;background:var(--surface);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}
.tab-bar{display:flex;gap:3px;padding:8px 12px}
.tab-btn{flex:1;padding:10px 0;border-radius:12px;font-size:12px;font-weight:600;color:var(--text2);transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.main{flex:1;padding:0 16px 100px;overflow-y:auto}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.card-title{font-size:14px;color:var(--text2);margin-bottom:8px;font-weight:500}
.card-value{font-size:32px;font-weight:700}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mot-card{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--radius);padding:20px;margin-bottom:12px}
.mot-card .emoji{font-size:28px;margin-bottom:6px}
.mot-card .msg{font-size:14px;font-weight:600;line-height:1.5}
.alert-card{background:var(--surface);border-left:4px solid var(--orange);border-radius:var(--radius);padding:16px 20px;margin-bottom:12px}
.alert-card.danger{border-left-color:var(--red)}
.alert-card .alert-title{font-size:13px;font-weight:600;margin-bottom:4px}
.alert-card .alert-msg{font-size:12px;color:var(--text2);line-height:1.5}
.goal-ring{width:120px;height:120px;margin:0 auto 12px;position:relative}
.goal-ring svg{transform:rotate(-90deg)}
.goal-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.goal-ring-pct{font-size:24px;font-weight:700}
.goal-ring-label{font-size:11px;color:var(--text2)}
.unit-bar-wrap{margin-bottom:10px}
.unit-bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.unit-bar-name{font-weight:500}.unit-bar-time{color:var(--text2)}
.unit-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.unit-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.plan-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--surface2)}
.plan-item:last-child{border-bottom:none}
.plan-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.plan-content{flex:1}.plan-name{font-size:14px;font-weight:500}.plan-dur{font-size:12px;color:var(--text2)}
.rec-unit-select{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.rec-chip{padding:10px 14px;border-radius:12px;background:var(--surface2);font-size:13px;font-weight:500;transition:all .2s}
.rec-chip.active{background:var(--accent)}
.timer-display{font-size:48px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-auto-stop{font-size:11px;color:var(--text2);text-align:center;margin-top:4px}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:16px}
.timer-btn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.timer-btn.start{background:var(--green)}.timer-btn.stop{background:var(--red)}.timer-btn.reset{background:var(--surface2)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--surface2);background:var(--bg);color:var(--text);font-size:14px}
.form-group input:focus{outline:none;border-color:var(--accent)}
.submit-btn{width:100%;padding:12px;border-radius:12px;background:var(--accent);font-size:14px;font-weight:600}
.log-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--surface2)}
.log-item:last-child{border-bottom:none}
.log-cat{font-size:11px;padding:4px 8px;border-radius:8px;font-weight:500;white-space:nowrap}
.log-info{flex:1}.log-time{font-size:12px;color:var(--text2)}
.log-mins{font-size:15px;font-weight:700;white-space:nowrap}
.log-edit{font-size:12px;color:var(--accent);padding:4px 8px}
.year-cal{margin-top:8px}
.year-month-label{font-size:12px;color:var(--text2);margin:12px 0 4px;font-weight:600}
.year-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.year-day{aspect-ratio:1;border-radius:4px;background:var(--surface2);cursor:pointer}
.year-day.empty{visibility:hidden}.year-day.future{opacity:0.3}.year-day.today{border:2px solid var(--accent)}
.year-day.lv1{background:rgba(59,130,246,0.2)}.year-day.lv2{background:rgba(59,130,246,0.4)}
.year-day.lv3{background:rgba(59,130,246,0.6)}.year-day.lv4{background:var(--accent)}.year-day.lv5{background:var(--accent2)}
.year-legend{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:8px;font-size:10px;color:var(--text2)}
.year-legend-box{width:12px;height:12px;border-radius:2px}
.week-bar-wrap{display:flex;align-items:flex-end;justify-content:space-between;height:100px;padding:0 4px}
.week-bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.week-bar{width:70%;min-width:16px;max-width:32px;border-radius:6px 6px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));transition:height .3s}
.week-bar-label{font-size:10px;color:var(--text2)}.week-bar-val{font-size:10px;color:var(--text2)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px 40px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px}
.modal-close{float:right;font-size:20px;padding:4px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;background:var(--green)}
.toast.show{opacity:1}.toast.warn{background:var(--orange)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
.date-nav button{font-size:20px;padding:8px}
.date-nav .date-label{font-size:15px;font-weight:600}
.rec-tabs{display:flex;gap:4px;margin-bottom:12px}
.rec-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text2);text-align:center;background:var(--surface2)}
.rec-tab.active{background:var(--accent);color:#fff}
/* Weekly report */
.rpt-section{margin-bottom:16px}
.rpt-section-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--surface2)}
.rpt-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0}
.rpt-row .rpt-label{color:var(--text2)}
.rpt-row .rpt-value{font-weight:600}
.rpt-row .rpt-value.good{color:var(--green)}
.rpt-row .rpt-value.warn{color:var(--orange)}
.rpt-row .rpt-value.bad{color:var(--red)}
.rpt-day-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px;margin-top:8px}
.rpt-day-label{color:var(--text2);font-weight:500}
.rpt-day-detail{color:var(--text)}
.rpt-overall{background:var(--bg);border-radius:12px;padding:16px;margin-top:12px}
.rpt-overall-title{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--accent2)}
.rpt-milestone{font-size:12px;color:var(--text2);line-height:1.6}
.rpt-milestone b{color:var(--text)}
.copy-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:14px;font-weight:600;margin-top:12px}
.copy-btn:active{opacity:0.8}
</style>
</head>
<body>
<div class="header">
  <h1>English Daily</h1>
  <div class="streak-badge"><span>🔥</span><span id="streakCount">0</span>日連続</div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="home">ホーム</button>
  <button class="tab-btn" data-tab="record">記録</button>
  <button class="tab-btn" data-tab="plan">計画</button>
  <button class="tab-btn" data-tab="report">週次</button>
  <button class="tab-btn" data-tab="history">履歴</button>
</div>
<div class="main">
  <!-- HOME -->
  <div class="page active" id="page-home">
    <div id="alertArea"></div>
    <div class="mot-card"><div class="emoji" id="motEmoji">💪</div><div class="msg" id="motMsg">今日も一歩前へ！</div></div>
    <div class="card" style="text-align:center">
      <div class="card-title">今日の達成度</div>
      <div class="goal-ring">
        <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="var(--surface2)" stroke-width="8"/><circle id="goalArc" cx="60" cy="60" r="52" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="var(--accent2)"/></linearGradient></defs></svg>
        <div class="goal-ring-text"><div class="goal-ring-pct" id="goalPct">0%</div><div class="goal-ring-label">150分目標</div></div>
      </div>
    </div>
    <div class="stats-row">
      <div class="card"><div class="card-title">今日</div><div class="card-value" id="todayMin">0<span style="font-size:16px">分</span></div></div>
      <div class="card"><div class="card-title">今週</div><div class="card-value" id="weekMin">0<span style="font-size:16px">分</span></div><div style="font-size:11px;color:var(--text2);margin-top:4px" id="weekGoalLabel">目標: 840分/週</div></div>
    </div>
    <div class="card"><div class="card-title">今日の単元別進捗</div><div id="unitBars"></div></div>
    <div class="card"><div class="card-title">週間学習時間</div><div class="week-bar-wrap" id="weekChart"></div></div>
  </div>
  <!-- RECORD -->
  <div class="page" id="page-record">
    <div class="rec-tabs"><button class="rec-tab active" onclick="switchRecTab('stopwatch')">ストップウォッチ</button><button class="rec-tab" onclick="switchRecTab('manual')">手動入力</button></div>
    <div id="recStopwatch">
      <div class="card"><div class="card-title">単元を選択</div><div class="rec-unit-select" id="recUnitSelect"></div></div>
      <div class="card" style="text-align:center"><div class="card-title" id="swUnitLabel">-</div><div class="timer-display" id="timerDisplay">00:00</div><div class="timer-auto-stop">90分で自動停止します</div><div class="timer-controls"><button class="timer-btn reset" onclick="resetTimer()">↺</button><button class="timer-btn start" id="timerToggle" onclick="toggleTimer()">▶</button><button class="timer-btn stop" onclick="saveTimer()">✓</button></div></div>
    </div>
    <div id="recManual" style="display:none">
      <div class="card">
        <div class="date-nav"><button onclick="bulkNav(-1)">‹</button><input type="date" id="bulkDate" onchange="onBulkDateChange()" style="padding:8px;border-radius:8px;border:1px solid var(--surface2);background:var(--bg);color:var(--text);font-size:14px"><button id="bulkNext" onclick="bulkNav(1)">›</button></div>
        <div id="bulkRows"></div>
        <button class="submit-btn" style="background:var(--surface2);margin-top:12px" onclick="bulkQuickFill()">計画通りに入力</button>
        <button class="submit-btn" style="margin-top:8px" onclick="saveBulk()">この日の記録を保存</button>
      </div>
    </div>
    <div class="card"><div class="card-title">今日の記録</div><div id="todayLogs"></div></div>
  </div>
  <!-- PLAN -->
  <div class="page" id="page-plan">
    <div class="card"><div class="card-title">1日の学習計画（合計 <span id="planTotal">150</span>分）</div><div id="planList"></div></div>
    <div class="card"><div class="card-title">目標設定</div><div class="form-group"><label>日次目標（分）</label><input type="number" id="dailyGoalInput" value="150" min="30" step="30"></div><div class="form-group"><label>週次最低ライン（分）</label><input type="number" id="weeklyMinInput" value="840" min="60" step="60"></div><button class="submit-btn" onclick="saveGoals()">保存</button></div>
    <div class="card"><div class="card-title">Versantスコア</div><div id="scoreList"></div><div class="form-group"><label>受験日</label><input type="date" id="scoreDate"></div><div class="form-group"><label>スコア</label><input type="number" id="scoreVal" min="20" max="80" placeholder="例: 32"></div><button class="submit-btn" onclick="addScore()">スコアを記録</button></div>
    <div class="card"><div class="card-title">データ管理</div><button class="submit-btn" onclick="exportData()">📋 データを書き出す（コピー）</button><div class="form-group" style="margin-top:12px"><label>復元用データ（JSON）を貼り付け</label><textarea id="importText" rows="3" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--surface2);background:var(--bg);color:var(--text);font-size:12px;font-family:inherit"></textarea></div><button class="submit-btn" style="background:var(--surface2)" onclick="importData()">データを読み込む</button></div>
  </div>
  <!-- WEEKLY REPORT -->
  <div class="page" id="page-report">
    <div class="card"><div class="card-title">週次レポート</div><div id="reportContent"></div><button class="copy-btn" onclick="copyReport()">📋 テキストレポートをコピー</button></div>
  </div>
  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="card"><div class="date-nav"><button onclick="histNav(-1)">‹</button><div class="date-label" id="histDateLabel"></div><button onclick="histNav(1)">›</button></div><div id="histDayDetail"></div></div>
    <div class="card"><div class="card-title">年間カレンダー（6月1日〜）</div><div class="year-cal" id="yearCal"></div><div class="year-legend"><span>少</span><div class="year-legend-box" style="background:rgba(59,130,246,0.2)"></div><div class="year-legend-box" style="background:rgba(59,130,246,0.4)"></div><div class="year-legend-box" style="background:rgba(59,130,246,0.6)"></div><div class="year-legend-box" style="background:var(--accent)"></div><div class="year-legend-box" style="background:var(--accent2)"></div><span>多</span></div></div>
  </div>
</div>
<!-- Edit modal -->
<div class="modal-overlay" id="editModal"><div class="modal"><button class="modal-close" onclick="closeModal('editModal')">✕</button><h3>記録を編集</h3><div class="form-group"><label>単元</label><select id="editUnit"></select></div><div class="form-group"><label>学習時間（分）</label><input type="number" id="editMins" min="1" max="180"></div><div style="display:flex;gap:8px"><button class="submit-btn" onclick="saveEdit()">保存</button><button class="submit-btn" style="background:var(--red)" onclick="deleteLog()">削除</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
const UNITS=[{id:'vocab',name:'英単語',icon:'📝',color:'#3b82f6'},{id:'composition',name:'英作文',icon:'✍️',color:'#8b5cf6'},{id:'speech',name:'1分スピーチ',icon:'🎤',color:'#22c55e'},{id:'shadowing',name:'シャドーイング',icon:'🎧',color:'#f59e0b'},{id:'reading',name:'リーディング/ヒアリング',icon:'📖',color:'#ef4444'}];
const DEFAULT_PLAN=UNITS.map(u=>({id:u.id,mins:30}));
const START_DATE='2026-06-01';
const AUTO_STOP_MINS=90;
const MILESTONES=[{date:'2026-09-01',label:'Versant第1回',target:30},{date:'2026-12-01',label:'Versant第2回',target:36},{date:'2027-03-01',label:'Versant第3回',target:40},{date:'2027-06-01',label:'最終目標',target:43}];
const MOTIVATION=[{emoji:'💪',msg:'今日も一歩前へ！小さな積み重ねが大きな力に'},{emoji:'🔥',msg:'継続は力なり！あなたならできる'},{emoji:'🌟',msg:'昨日の自分を超えよう！'},{emoji:'🎯',msg:'目標に向かって着実に前進中！'},{emoji:'📈',msg:'毎日の学習が確実に実を結んでいます'},{emoji:'🏆',msg:'英語力は日々成長中！自分を信じて'},{emoji:'⚡',msg:'今日の2.5時間が未来を変える'},{emoji:'🌈',msg:'楽しみながら学ぼう！それが最強の学習法'}];

const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>iso(new Date());
const dayLabel=d=>['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()];
const fmtDate=d=>{const dt=new Date(d+'T00:00:00');return `${dt.getMonth()+1}/${dt.getDate()}(${dayLabel(d)})`};

let logs=load('logs',{});
let plan=load('plan',DEFAULT_PLAN);
let goals=load('goals',{daily:150,weeklyMin:840});
let scores=load('scores',[]);
let histDate=new Date();
let nextLogId=load('nextLogId',1);

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('page-'+btn.dataset.tab).classList.add('active');if(btn.dataset.tab==='home')renderHome();if(btn.dataset.tab==='record')renderRecord();if(btn.dataset.tab==='plan')renderPlan();if(btn.dataset.tab==='report')renderReport();if(btn.dataset.tab==='history')renderHistory();});});

// Timer
let timerInterval=null,timerSecs=0,timerRunning=false,selectedUnit=UNITS[0].id;
function renderUnitSelect(){document.getElementById('recUnitSelect').innerHTML=UNITS.map(u=>`<button class="rec-chip ${u.id===selectedUnit?'active':''}" onclick="selectUnit('${u.id}')">${u.icon} ${u.name}</button>`).join('');const u=UNITS.find(x=>x.id===selectedUnit);document.getElementById('swUnitLabel').textContent=u?u.icon+' '+u.name:'';}
function selectUnit(id){selectedUnit=id;renderUnitSelect();}
function toggleTimer(){if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerToggle').textContent='▶';document.getElementById('timerToggle').className='timer-btn start';}else{timerInterval=setInterval(()=>{timerSecs++;updateTimerDisplay();if(timerSecs>=AUTO_STOP_MINS*60){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerToggle').textContent='▶';document.getElementById('timerToggle').className='timer-btn start';showToast('90分経過 — 自動停止しました','warn');}},1000);timerRunning=true;document.getElementById('timerToggle').textContent='⏸';document.getElementById('timerToggle').className='timer-btn stop';}}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerSecs=0;updateTimerDisplay();document.getElementById('timerToggle').textContent='▶';document.getElementById('timerToggle').className='timer-btn start';}
function updateTimerDisplay(){const m=Math.floor(timerSecs/60),s=timerSecs%60;document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function saveTimer(){if(timerSecs<60){showToast('1分以上学習してから保存してください');return;}addLog(today(),selectedUnit,Math.round(timerSecs/60));resetTimer();showToast('記録しました！');}

function switchRecTab(tab){document.querySelectorAll('.rec-tab').forEach(t=>t.classList.remove('active'));if(tab==='stopwatch'){document.querySelectorAll('.rec-tab')[0].classList.add('active');document.getElementById('recStopwatch').style.display='';document.getElementById('recManual').style.display='none';}else{document.querySelectorAll('.rec-tab')[1].classList.add('active');document.getElementById('recStopwatch').style.display='none';document.getElementById('recManual').style.display='';}}
let bulkDate=today();
function renderBulk(){document.getElementById('bulkDate').value=bulkDate;document.getElementById('bulkDate').max=today();document.getElementById('bulkNext').disabled=(bulkDate>=today());document.getElementById('bulkRows').innerHTML=UNITS.map(u=>{const cur=getDayUnitMins(bulkDate,u.id);return `<div class="plan-item"><div class="plan-icon" style="background:${u.color}20">${u.icon}</div><div class="plan-content"><div class="plan-name">${u.name}</div></div><input type="number" id="bulk-${u.id}" value="${cur}" min="0" max="300" step="5" style="width:70px;padding:8px;border-radius:8px;border:1px solid var(--surface2);background:var(--bg);color:var(--text);font-size:14px;text-align:center"></div>`;}).join('');}

function getDayMins(date){return(logs[date]||[]).reduce((s,l)=>s+l.mins,0);}
function getDayUnitMins(date,unitId){return(logs[date]||[]).filter(l=>l.unit===unitId).reduce((s,l)=>s+l.mins,0);}
function getWeekMins(){const now=new Date();let total=0;for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);total+=getDayMins(iso(d));}return total;}

function calcStreak(){let count=0;const d=new Date();if(getDayMins(iso(d))===0)d.setDate(d.getDate()-1);while(true){const ds=iso(d);if(ds<START_DATE)break;if(getDayMins(ds)===0)break;count++;d.setDate(d.getDate()-1);}return count;}

function getAlerts(){const alerts=[];UNITS.forEach(u=>{let missed=0;for(let i=1;i<=3;i++){const dd=new Date();dd.setDate(dd.getDate()-i);const ds=iso(dd);if(ds<START_DATE)break;if(getDayUnitMins(ds,u.id)===0)missed++;else break;}if(missed>=2){alerts.push({type:missed>=3?'danger':'warn',title:`${u.icon} ${u.name}が${missed}日間できていません`,msg:missed>=3?'少しでもいいので今日は取り組みましょう！5分でもOKです':'今日こそ取り組みましょう！継続が力になります'});}});const weekMins=getWeekMins();const dow=(new Date().getDay()||7);const expectedByNow=Math.round(goals.weeklyMin/7*dow);if(weekMins<expectedByNow*0.7){alerts.push({type:'warn',title:'📊 週次ペースが遅れています',msg:`現在${weekMins}分 / 目標ペース${expectedByNow}分。少しペースを上げましょう！`});}return alerts;}
function getMotivation(){const dm=getDayMins(today()),wm=getWeekMins(),sc=calcStreak();if(sc>0&&sc%7===0)return{emoji:'🏆',msg:`${sc}日連続達成！素晴らしい継続力です！`};if(sc>=3)return{emoji:'🔥',msg:`${sc}日連続学習中！この調子！`};if(dm>=goals.daily)return{emoji:'🎉',msg:'今日の目標達成！素晴らしい！'};if(dm>=goals.daily*0.8)return{emoji:'💪',msg:'あと少しで今日の目標達成！'};if(wm>=goals.weeklyMin)return{emoji:'⭐',msg:'週次目標クリア！最高の週です！'};return MOTIVATION[Math.floor(Math.random()*MOTIVATION.length)];}

// ===== WEEKLY REPORT =====
function getWeeklyReportData(){
  const dates=getWeekDates();
  const weekTotal=dates.reduce((s,d)=>s+getDayMins(d),0);
  const unitData=UNITS.map(u=>{
    const planned=plan.find(p=>p.id===u.id)?.mins||30;
    const weekPlanned=planned*7;
    const weekActual=dates.reduce((s,d)=>s+getDayUnitMins(d,u.id),0);
    const daysActive=dates.filter(d=>getDayUnitMins(d,u.id)>0).length;
    return{...u,planned,weekPlanned,weekActual,pct:Math.round(weekActual/weekPlanned*100),daysActive};
  });
  // Overall progress since start
  const startD=new Date(START_DATE+'T00:00:00');
  const todayD=new Date(today()+'T00:00:00');
  const totalDays=Math.max(1,Math.floor((todayD-startD)/(86400000)));
  const totalWeeks=Math.max(1,Math.ceil(totalDays/7));
  let totalAllMins=0;
  for(let d=new Date(startD);d<=todayD;d.setDate(d.getDate()+1)){totalAllMins+=getDayMins(iso(d));}
  const avgDaily=Math.round(totalAllMins/totalDays);
  const avgWeekly=Math.round(totalAllMins/totalWeeks);
  // Next milestone
  const nextMs=MILESTONES.find(m=>m.date>today())||MILESTONES[MILESTONES.length-1];
  const daysToMs=Math.max(0,Math.floor((new Date(nextMs.date+'T00:00:00')-todayD)/86400000));
  const weeksToMs=Math.ceil(daysToMs/7);
  return{dates,weekTotal,unitData,totalDays,totalAllMins,avgDaily,avgWeekly,nextMs,daysToMs,weeksToMs,streak:calcStreak()};
}

  });

  html+=`累計学習時間: ${r.totalAllMins}分 (${Math.round(r.totalAllMins/60)}時間)<br>`;
  html+=`日平均: ${r.avgDaily}分 / 週平均: ${r.avgWeekly}分<br><br>`;
  html+=`<b>次のマイルストーン: ${r.nextMs.label}</b><br>`;
  html+=`目標: Versant ${r.nextMs.target}点<br>`;
  const ls=latestScore();

  html+=`残り: ${r.daysToMs}日 (${r.weeksToMs}週間)<br>`;
  const onTrack=r.avgWeekly>=goals.weeklyMin;
  html+=onTrack?`<span style="color:var(--green)">✅ 現在のペースは計画通りです</span>`:`<span style="color:var(--orange)">⚠️ 週平均${r.avgWeekly}分は目標${goals.weeklyMin}分を下回っています。1日あたり${Math.ceil((goals.weeklyMin-r.avgWeekly)/7)}分の上積みが必要です</span>`;
  html+=`</div></div>`;
  document.getElementById('reportContent').innerHTML=html;
}

function getAllWeeks(){
  const startD=new Date(START_DATE+'T00:00:00');
  const todayD=new Date(today()+'T00:00:00');
  const weeks=[];
  let weekStart=new Date(startD);
  while(weekStart<=todayD){
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+6);
    if(weekEnd>todayD)weekEnd.setTime(todayD.getTime());
    const dates=[];
    for(let d=new Date(weekStart);d<=weekEnd;d.setDate(d.getDate()+1)){dates.push(iso(d));}
    const total=dates.reduce((s,d)=>s+getDayMins(d),0);
    const unitTotals={};
    UNITS.forEach(u=>{unitTotals[u.id]=dates.reduce((s,d)=>s+getDayUnitMins(d,u.id),0);});
    const activeDays=dates.filter(d=>getDayMins(d)>0).length;
    weeks.push({num:weeks.length+1,startDate:dates[0],endDate:dates[dates.length-1],dates,total,unitTotals,activeDays});
    weekStart=new Date(weekEnd);weekStart.setDate(weekStart.getDate()+1);
  }
  return weeks;
}

function getMonthlyData(){
  const startD=new Date(START_DATE+'T00:00:00');
  const todayD=new Date(today()+'T00:00:00');
  const months={};
  for(let d=new Date(startD);d<=todayD;d.setDate(d.getDate()+1)){
    const ds=iso(d);
    const mKey=`${d.getFullYear()}年${d.getMonth()+1}月`;
    if(!months[mKey]){months[mKey]={total:0,units:{},days:0,activeDays:0};UNITS.forEach(u=>months[mKey].units[u.id]=0);}
    const dayTotal=getDayMins(ds);
    months[mKey].total+=dayTotal;
    months[mKey].days++;
    if(dayTotal>0)months[mKey].activeDays++;
    UNITS.forEach(u=>{months[mKey].units[u.id]+=getDayUnitMins(ds,u.id);});
  }
  return months;
}

function generateReportText(){
  const r=getWeeklyReportData();
  const allWeeks=getAllWeeks();
  const monthlyData=getMonthlyData();
  const currentWeekNum=allWeeks.length;

  let t=`【English Daily 週次レポート】\n`;
  t+=`期間: ${fmtDate(r.dates[0])}〜${fmtDate(r.dates[6])} (第${currentWeekNum}週)\n`;
  t+=`連続学習: ${r.streak}日\n\n`;

  // This week
  t+=`■ 今週の実績: ${r.weekTotal}分 / 目標${goals.weeklyMin}分 (${Math.round(r.weekTotal/goals.weeklyMin*100)}%)\n\n`;
  t+=`■ 単元別:\n`;
  r.unitData.forEach(u=>{t+=`  ${u.icon} ${u.name}: ${u.weekActual}/${u.weekPlanned}分 (${u.pct}%) [実施${u.daysActive}/7日]\n`;});
  t+=`\n■ 日別:\n`;
  r.dates.forEach(d=>{
    const total=getDayMins(d);
    const details=UNITS.map(u=>{const m=getDayUnitMins(d,u.id);return m>0?`${u.name}${m}分`:''}).filter(x=>x).join(', ');
    t+=`  ${fmtDate(d)}: ${total>0?`${total}分 (${details})`:'-'}\n`;
  });

  // Weekly trend
  t+=`\n■ 週次推移:\n`;
  allWeeks.forEach(w=>{
    const pct=Math.round(w.total/goals.weeklyMin*100);
    t+=`  第${w.num}週 (${fmtDate(w.startDate)}〜): ${w.total}分 (${pct}%) 実施${w.activeDays}/${w.dates.length}日\n`;
  });

  // Unit trend across weeks
  t+=`\n■ 単元別 週次推移:\n`;
  UNITS.forEach(u=>{
    const planned=(plan.find(p=>p.id===u.id)?.mins||30)*7;
    t+=`  ${u.icon} ${u.name}: `;
    t+=allWeeks.map(w=>`第${w.num}週${w.unitTotals[u.id]}分(${Math.round(w.unitTotals[u.id]/planned*100)}%)`).join(' → ');
    t+=`\n`;
  });

  // Monthly summary
  t+=`\n■ 月別累計:\n`;
  Object.entries(monthlyData).forEach(([month,data])=>{
    t+=`  ${month}: 合計${data.total}分 (日平均${Math.round(data.total/data.days)}分, 実施${data.activeDays}/${data.days}日)\n`;
    UNITS.forEach(u=>{
      if(data.units[u.id]>0) t+=`    ${u.icon} ${u.name}: ${data.units[u.id]}分\n`;
    });
  });

  // Overall
  t+=`\n■ 全体進捗:\n`;
  t+=`  学習${r.totalDays}日目 / 累計${r.totalAllMins}分(${Math.round(r.totalAllMins/60)}時間)\n`;
  t+=`  日平均${r.avgDaily}分 / 週平均${r.avgWeekly}分\n`;
  t+=`  次のマイルストーン: ${r.nextMs.label} (Versant${r.nextMs.target}点, 残り${r.daysToMs}日)\n`;
  const ls=latestScore();
  t+=`  直近Versantスコア: ${ls?`${ls.score}点 (${ls.date})`:'未受験'}\n`;
  const onTrack=r.avgWeekly>=goals.weeklyMin;
  t+=onTrack?`  → 計画通りのペースです\n`:`  → 週${goals.weeklyMin-r.avgWeekly}分不足。1日+${Math.ceil((goals.weeklyMin-r.avgWeekly)/7)}分が必要\n`;
  return t;
}

function copyReport(){

  navigator.clipboard.writeText(t).then(()=>showToast('レポートをコピーしました！')).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('レポートをコピーしました！');
  });
}

// History
function histNav(dir){histDate.setDate(histDate.getDate()+dir);renderHistory();}
function renderHistory(){const ds=iso(histDate);document.getElementById('histDateLabel').textContent=`${histDate.getMonth()+1}月${histDate.getDate()}日（${dayLabel(ds)}）`;const dl=logs[ds]||[];const totalMins=dl.reduce((s,l)=>s+l.mins,0);let html=`<div style="text-align:center;margin-bottom:12px"><span style="font-size:24px;font-weight:700">${totalMins}</span><span style="font-size:14px;color:var(--text2)"> / ${goals.daily}分</span></div>`;html+=UNITS.map(u=>{const actual=dl.filter(l=>l.unit===u.id).reduce((s,l)=>s+l.mins,0);const planned=plan.find(p=>p.id===u.id)?.mins||30;const p=Math.min(100,Math.round(actual/planned*100));return `<div class="unit-bar-wrap"><div class="unit-bar-header"><span class="unit-bar-name">${u.icon} ${u.name}</span><span class="unit-bar-time">${actual}/${planned}分</span></div><div class="unit-bar"><div class="unit-bar-fill" style="width:${p}%;background:${u.color}"></div></div></div>`;}).join('');if(dl.length>0){html+='<div style="margin-top:12px">';dl.forEach(l=>{const u=UNITS.find(x=>x.id===l.unit);html+=`<div class="log-item"><span class="log-cat" style="background:${u?u.color:'#666'}20;color:${u?u.color:'#666'}">${u?u.icon+' '+u.name:l.unit}</span><div class="log-info"><div class="log-time">${l.time||''}</div></div><div class="log-mins">${l.mins}分</div><button class="log-edit" onclick="openEdit('${ds}',${l.id})">編集</button></div>`;});html+='</div>';}html+=`<button class="submit-btn" style="margin-top:12px;background:var(--surface2)" onclick="addManualForDate('${ds}')">＋ この日に記録を追加</button>`;document.getElementById('histDayDetail').innerHTML=html;renderYearCal();}
function addManualForDate(date){bulkDate=date>today()?today():date;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-btn')[1].classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-record').classList.add('active');switchRecTab('manual');renderBulk();}
function renderYearCal(){const start=new Date(START_DATE+'T00:00:00');const end=new Date(start);end.setFullYear(end.getFullYear()+1);const todayStr=today();let html='';let curMonth=-1;for(let d=new Date(start);d<end;d.setDate(d.getDate()+1)){const m=d.getMonth();if(m!==curMonth){if(curMonth!==-1)html+='</div>';curMonth=m;html+=`<div class="year-month-label">${m+1}月</div><div class="year-grid">`;if(d.getDate()===1){const dow=d.getDay();for(let i=0;i<dow;i++)html+='<div class="year-day empty"></div>';}}const ds=iso(d);const mins=getDayMins(ds);let cls='year-day';if(ds===todayStr)cls+=' today';if(ds>todayStr)cls+=' future';else if(mins>0){const ratio=mins/goals.daily;if(ratio>=1)cls+=' lv5';else if(ratio>=0.8)cls+=' lv4';else if(ratio>=0.6)cls+=' lv3';else if(ratio>=0.3)cls+=' lv2';else cls+=' lv1';}html+=`<div class="${cls}" onclick="jumpToDate('${ds}')"></div>`;}html+='</div>';document.getElementById('yearCal').innerHTML=html;}
function jumpToDate(ds){histDate=new Date(ds+'T00:00:00');renderHistory();window.scrollTo(0,0);}

function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='warn'?' warn':'');setTimeout(()=>t.className='toast',2500);}

function init(){renderHome();renderRecord();renderPlan();histDate=new Date();renderHistory();}
init();
</script>
