<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>English Daily</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --accent: #3b82f6;
  --accent2: #8b5cf6;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; overflow-x:hidden; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:var(--text); }

/* Header */
.header { padding:16px 20px 8px; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:20px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.streak-badge { display:flex; align-items:center; gap:4px; background:var(--surface); padding:6px 12px; border-radius:20px; font-size:13px; font-weight:600; }
.streak-badge .fire { font-size:16px; }

/* Tab Bar */
.tab-bar { display:flex; gap:4px; padding:8px 16px; }
.tab-btn { flex:1; padding:10px 0; border-radius:12px; font-size:13px; font-weight:600; color:var(--text2); transition:all .2s; }
.tab-btn.active { background:var(--accent); color:#fff; }

/* Main content */
.main { flex:1; padding:0 16px 100px; overflow-y:auto; }
.page { display:none; }
.page.active { display:block; }

/* Cards */
.card { background:var(--surface); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
.card-title { font-size:14px; color:var(--text2); margin-bottom:8px; font-weight:500; }
.card-value { font-size:32px; font-weight:700; }
.card-sub { font-size:12px; color:var(--text2); margin-top:4px; }

/* Stats row */
.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }

/* Timer */
.timer-display { font-size:48px; font-weight:700; text-align:center; font-variant-numeric:tabular-nums; letter-spacing:2px; }
.timer-controls { display:flex; gap:12px; justify-content:center; margin-top:16px; }
.timer-btn { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; }
.timer-btn.start { background:var(--green); }
.timer-btn.stop { background:var(--red); }
.timer-btn.reset { background:var(--surface2); }
.category-select { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.cat-chip { padding:8px 16px; border-radius:20px; background:var(--surface2); font-size:13px; font-weight:500; transition:all .2s; }
.cat-chip.active { background:var(--accent); }

/* Calendar */
.cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.cal-header button { font-size:18px; padding:8px; }
.cal-header span { font-size:15px; font-weight:600; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; }
.cal-day-label { font-size:11px; color:var(--text2); padding:4px 0; }
.cal-day { width:100%; aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:500; position:relative; }
.cal-day.today { border:2px solid var(--accent); }
.cal-day.has-study { background:var(--accent); color:#fff; }
.cal-day.has-study.low { background:rgba(59,130,246,0.3); }
.cal-day.has-study.mid { background:rgba(59,130,246,0.6); }
.cal-day.has-study.high { background:var(--accent); }
.cal-day.empty { visibility:hidden; }

/* Chart */
.chart-container { position:relative; height:160px; margin-top:12px; }
.chart-bar-wrap { display:flex; align-items:flex-end; justify-content:space-between; height:130px; padding:0 4px; }
.chart-bar-col { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.chart-bar { width:70%; min-width:16px; max-width:32px; border-radius:6px 6px 0 0; background:linear-gradient(to top, var(--accent), var(--accent2)); transition:height .3s; }
.chart-label { font-size:10px; color:var(--text2); }
.chart-val { font-size:10px; color:var(--text2); }

/* Schedule */
.schedule-item { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--surface2); }
.schedule-item:last-child { border-bottom:none; }
.schedule-time { font-size:13px; color:var(--text2); width:50px; font-weight:600; }
.schedule-content { flex:1; }
.schedule-name { font-size:14px; font-weight:500; }
.schedule-dur { font-size:12px; color:var(--text2); }
.schedule-check { width:28px; height:28px; border-radius:50%; border:2px solid var(--surface2); display:flex; align-items:center; justify-content:center; font-size:14px; transition:all .2s; }
.schedule-check.done { background:var(--green); border-color:var(--green); }
.add-btn { width:100%; padding:14px; border-radius:var(--radius); border:2px dashed var(--surface2); color:var(--text2); font-size:14px; margin-top:8px; transition:all .2s; }
.add-btn:active { border-color:var(--accent); color:var(--accent); }

/* Vocab */
.vocab-card-area { min-height:280px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.vocab-word { font-size:28px; font-weight:700; text-align:center; margin-bottom:8px; cursor:pointer; }
.vocab-word:active { opacity:0.6; }
.speak-btn { background:none; border:none; font-size:24px; cursor:pointer; margin-left:8px; vertical-align:middle; opacity:0.7; }
.speak-btn:active { opacity:1; }
.vocab-hint { font-size:14px; color:var(--text2); text-align:center; margin-bottom:20px; }
.vocab-answer { font-size:20px; font-weight:600; text-align:center; color:var(--green); margin-bottom:4px; opacity:0; transition:opacity .3s; }
.vocab-answer.show { opacity:1; }
.vocab-example { font-size:13px; color:var(--text2); text-align:center; opacity:0; transition:opacity .3s; margin-bottom:16px; }
.vocab-example.show { opacity:1; }
.vocab-speed-select { width:100%; }
.speed-label { font-size:13px; color:var(--text2); margin-bottom:10px; text-align:center; }
.speed-buttons { display:flex; gap:10px; }
.speed-btn { flex:1; padding:16px 0; border-radius:14px; font-size:18px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:4px; transition:all .15s; }
.speed-btn span { font-size:11px; font-weight:500; opacity:0.8; }
.speed-btn.fast { background:var(--green); }
.speed-btn.normal { background:var(--accent); }
.speed-btn.slow { background:var(--orange); }
.speed-btn:active { transform:scale(0.95); }
.vocab-countdown { font-size:64px; font-weight:800; color:var(--accent); min-height:80px; display:flex; align-items:center; justify-content:center; }
.vocab-countdown.pulse { animation:countPulse .4s ease-out; }
@keyframes countPulse { 0%{transform:scale(1.4);opacity:0.5} 100%{transform:scale(1);opacity:1} }
.vocab-rating { display:flex; gap:10px; margin-top:12px; }
.vocab-rating button { flex:1; padding:14px 0; border-radius:12px; font-size:13px; font-weight:600; }
.vocab-rating .r-hard { background:var(--red); }
.vocab-rating .r-ok { background:var(--orange); }
.vocab-rating .r-easy { background:var(--green); }
.vocab-level-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; margin-bottom:16px; }
.vocab-level-badge.l700 { background:rgba(59,130,246,0.2); color:var(--accent); }
.vocab-level-badge.l800 { background:rgba(139,92,246,0.2); color:var(--accent2); }
.vocab-progress { width:100%; height:6px; background:var(--surface2); border-radius:3px; margin-bottom:16px; overflow:hidden; }
.vocab-progress-bar { height:100%; border-radius:3px; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width .5s; }
.vocab-stats-row { display:flex; justify-content:space-around; margin-bottom:16px; }
.vocab-stat { text-align:center; }
.vocab-stat-val { font-size:20px; font-weight:700; }
.vocab-stat-label { font-size:11px; color:var(--text2); }

/* Round progress */
.round-progress { display:flex; justify-content:center; gap:8px; }
.round-dot { width:28px; height:28px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; transition:all .3s; }
.round-dot.current { border:2px solid var(--accent); background:transparent; color:var(--accent); }
.round-dot.done-easy { background:var(--green); color:#fff; }
.round-dot.done-ok { background:var(--orange); color:#fff; }
.round-dot.done-hard { background:var(--red); color:#fff; }

/* Motivation */
.motivation-card { background:linear-gradient(135deg, var(--accent), var(--accent2)); border-radius:var(--radius); padding:20px; margin-bottom:12px; text-align:center; }
.motivation-card .emoji { font-size:32px; margin-bottom:8px; }
.motivation-card .msg { font-size:15px; font-weight:600; line-height:1.5; }

/* Daily goal */
.goal-ring { width:120px; height:120px; margin:0 auto 12px; position:relative; }
.goal-ring svg { transform:rotate(-90deg); }
.goal-ring-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.goal-ring-pct { font-size:24px; font-weight:700; }
.goal-ring-label { font-size:11px; color:var(--text2); }

/* Modal */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:100; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-width:500px; padding:24px 20px 40px; max-height:80vh; overflow-y:auto; }
.modal h3 { font-size:17px; font-weight:600; margin-bottom:16px; }
.modal-close { float:right; font-size:20px; padding:4px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:var(--text2); margin-bottom:6px; }
.form-group input, .form-group select { width:100%; padding:12px; border-radius:12px; border:1px solid var(--surface2); background:var(--bg); color:var(--text); font-size:15px; }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); }
.submit-btn { width:100%; padding:14px; border-radius:12px; background:var(--accent); font-size:15px; font-weight:600; }

/* Level up animation */
.levelup-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.8); z-index:200; display:none; align-items:center; justify-content:center; flex-direction:column; }
.levelup-overlay.show { display:flex; animation:fadeIn .3s; }
.levelup-text { font-size:28px; font-weight:700; background:linear-gradient(135deg,var(--orange),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:popIn .5s; }
.levelup-sub { font-size:16px; color:var(--text2); margin-top:8px; }
@keyframes popIn { 0%{transform:scale(0)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* Toast */
.toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); background:var(--green); padding:10px 24px; border-radius:20px; font-size:13px; font-weight:600; z-index:300; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }

/* Vocab add form */
.vocab-add-section { margin-top:12px; }
.vocab-add-toggle { font-size:13px; color:var(--accent); text-decoration:underline; background:none; border:none; cursor:pointer; margin-bottom:8px; }
</style>
</head>
<body>

<div class="header">
  <h1>English Daily</h1>
  <div class="streak-badge"><span class="fire">🔥</span><span id="streakCount">0</span>日連続</div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="home">ホーム</button>
  <button class="tab-btn" data-tab="timer">記録</button>
  <button class="tab-btn" data-tab="schedule">計画</button>
  <button class="tab-btn" data-tab="vocab">単語</button>
</div>

<div class="main">
  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="motivation-card">
      <div class="emoji" id="motEmoji">💪</div>
      <div class="msg" id="motMsg">今日も一歩前へ！</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="card-title">今日の目標達成度</div>
      <div class="goal-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" fill="none" stroke="var(--surface2)" stroke-width="8"/>
          <circle id="goalArc" cx="60" cy="60" r="52" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/>
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="var(--accent2)"/></linearGradient></defs>
        </svg>
        <div class="goal-ring-text">
          <div class="goal-ring-pct" id="goalPct">0%</div>
          <div class="goal-ring-label">60分目標</div>
        </div>
      </div>
    </div>
    <div class="stats-row">
      <div class="card">
        <div class="card-title">今日の学習</div>
        <div class="card-value" id="todayMin">0<span style="font-size:16px">分</span></div>
      </div>
      <div class="card">
        <div class="card-title">今週合計</div>
        <div class="card-value" id="weekMin">0<span style="font-size:16px">分</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">単語マスター進捗</div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <div class="card-value" id="vocabMastered">0</div>
        <span style="color:var(--text2);font-size:14px">/ <span id="vocabTotal">0</span> 語</span>
      </div>
      <div class="vocab-progress" style="margin-top:8px"><div class="vocab-progress-bar" id="homeVocabBar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="card-title">週間学習時間</div>
      <div class="chart-container">
        <div class="chart-bar-wrap" id="weekChart"></div>
      </div>
    </div>
    <div class="card">
      <div class="cal-header">
        <button onclick="calNav(-1)">‹</button>
        <span id="calMonth"></span>
        <button onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- TIMER -->
  <div class="page" id="page-timer">
    <div class="card">
      <div class="card-title">学習カテゴリ</div>
      <div class="category-select" id="catSelect"></div>
    </div>
    <div class="card" style="text-align:center">
      <div class="card-title">学習時間</div>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="timer-controls">
        <button class="timer-btn reset" onclick="resetTimer()">↺</button>
        <button class="timer-btn start" id="timerToggle" onclick="toggleTimer()">▶</button>
        <button class="timer-btn stop" onclick="saveSession()">✓</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">今日の記録</div>
      <div id="todayLogs"></div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div class="page" id="page-schedule">
    <div class="card">
      <div class="card-title" id="scheduleDate"></div>
      <div id="scheduleList"></div>
      <button class="add-btn" onclick="openScheduleModal()">＋ 学習予定を追加</button>
    </div>
    <div class="card">
      <div class="card-title">週間テンプレート</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px">毎週繰り返す学習計画を設定</p>
      <button class="add-btn" onclick="openTemplateModal()">＋ テンプレートを編集</button>
    </div>
  </div>

  <!-- VOCAB -->
  <div class="page" id="page-vocab">
    <!-- Stats -->
    <div class="card" style="text-align:center">
      <div class="vocab-stats-row">
        <div class="vocab-stat"><div class="vocab-stat-val" id="vToday">0</div><div class="vocab-stat-label">今日</div></div>
        <div class="vocab-stat"><div class="vocab-stat-val" id="vMastered">0</div><div class="vocab-stat-label">習得済</div></div>
        <div class="vocab-stat"><div class="vocab-stat-val" id="vRemain">0</div><div class="vocab-stat-label">残り</div></div>
      </div>
      <div id="vocabLevelBadge" class="vocab-level-badge l700">TOEIC 700</div>
      <div class="vocab-progress"><div class="vocab-progress-bar" id="vocabBar" style="width:0%"></div></div>
    </div>

    <!-- Settings (shown first) -->
    <div class="card" id="vocabSettings" style="text-align:center">
      <div class="card-title" style="margin-bottom:16px">制限時間を選んでスタート</div>
      <div class="speed-buttons">
        <button class="speed-btn fast" onclick="startRound(3)">3秒<span>早い</span></button>
        <button class="speed-btn normal" onclick="startRound(4)">4秒<span>普通</span></button>
        <button class="speed-btn slow" onclick="startRound(5)">5秒<span>遅い</span></button>
      </div>
    </div>

    <!-- Quiz area (hidden until start) -->
    <div id="vocabQuizWrap" style="display:none">
      <div class="card" style="text-align:center">
        <div class="round-progress" id="roundProgress"></div>
      </div>
      <div class="card">
        <div class="vocab-card-area" id="vocabArea">
          <div class="vocab-word" id="vWord" onclick="speakWord()">-</div>
          <div class="vocab-hint" id="vHint"></div>
          <div class="vocab-countdown" id="vCountdown"></div>
          <div class="vocab-answer" id="vAnswer">-</div>
          <div class="vocab-example" id="vExample"></div>
          <div class="vocab-rating" id="vRating" style="display:none">
            <button class="r-hard" onclick="rateWord(0)">わからない</button>
            <button class="r-ok" onclick="rateWord(1)">わかる</button>
            <button class="r-easy" onclick="rateWord(2)">すぐわかる</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Round result (hidden until 10 done) -->
    <div class="card" id="roundResult" style="display:none;text-align:center">
      <div class="card-title" style="margin-bottom:12px">10問完了！</div>
      <div class="round-result-stats">
        <div class="vocab-stats-row">
          <div class="vocab-stat"><div class="vocab-stat-val" id="rrEasy" style="color:var(--green)">0</div><div class="vocab-stat-label">すぐわかる</div></div>
          <div class="vocab-stat"><div class="vocab-stat-val" id="rrOk" style="color:var(--orange)">0</div><div class="vocab-stat-label">わかる</div></div>
          <div class="vocab-stat"><div class="vocab-stat-val" id="rrHard" style="color:var(--red)">0</div><div class="vocab-stat-label">わからない</div></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="submit-btn" style="background:var(--accent)" onclick="startRound(currentSpeed)">もう10問</button>
        <button class="submit-btn" style="background:var(--surface2)" onclick="backToSettings()">設定に戻る</button>
      </div>
    </div>

    <!-- Add custom word -->
    <div class="card vocab-add-section">
      <button class="vocab-add-toggle" onclick="toggleVocabAdd()">＋ 自分で単語を追加</button>
      <div id="vocabAddForm" style="display:none">
        <div class="form-group"><label>英単語</label><input id="vaWord" placeholder="例: substantial"></div>
        <div class="form-group"><label>意味</label><input id="vaMeaning" placeholder="例: かなりの、実質的な"></div>
        <div class="form-group"><label>例文（任意）</label><input id="vaExample" placeholder="例: a substantial increase"></div>
        <div class="form-group">
          <label>レベル</label>
          <select id="vaLevel"><option value="700">TOEIC 700</option><option value="800">TOEIC 800</option></select>
        </div>
        <button class="submit-btn" onclick="addCustomWord()">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- Schedule Modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('scheduleModal')">✕</button>
    <h3>学習予定を追加</h3>
    <div class="form-group"><label>時間</label><input type="time" id="schTime" value="07:00"></div>
    <div class="form-group"><label>内容</label><input id="schName" placeholder="例: シャドーイング"></div>
    <div class="form-group"><label>時間（分）</label><input type="number" id="schDur" value="30" min="5" step="5"></div>
    <button class="submit-btn" onclick="addSchedule()">追加</button>
  </div>
</div>

<!-- Template Modal -->
<div class="modal-overlay" id="templateModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('templateModal')">✕</button>
    <h3>週間テンプレート</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">ここに追加した予定は毎日自動でスケジュールに入ります</p>
    <div id="templateList"></div>
    <div class="form-group"><label>時間</label><input type="time" id="tplTime" value="07:00"></div>
    <div class="form-group"><label>内容</label><input id="tplName" placeholder="例: 単語学習"></div>

</div>

<script>
// ===== DATA =====
const CATEGORIES = ['シャドーイング','口頭英作文','単語学習','多読','リスニング','その他'];
const MOTIVATION_MSGS = [

// TOEIC Words
const VOCAB_DATA = {

    {w:'infrastructure',m:'インフラ、基盤',ex:'IT infrastructure'},
    {w:'proprietary',m:'独自の、所有の',ex:'proprietary software'},
    {w:'resilient',m:'回復力のある',ex:'resilient economy'},

// ===== STORAGE =====
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function today() { return new Date().toISOString().slice(0,10); }
function dayOfWeek(d) { return ['日','月','火','水','木','金','土'][new Date(d).getDay()]; }

// ===== STATE =====
let studyLogs = load('studyLogs', {});  // {date: [{cat, mins, time}]}
let schedule = load('schedule', {});     // {date: [{time, name, dur, done}]}
let templates = load('templates', []);   // [{time, name, dur}]
let vocabState = load('vocabState', {}); // {word: {level, interval, nextDate, ease, speed[]}}
let customWords = load('customWords', []);
let streak = load('streak', {count:0, lastDate:''});
let calViewDate = new Date();

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + btn.dataset.tab).classList.add('active');
  });
});

// ===== TIMER =====
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let selectedCat = CATEGORIES[0];

function renderCategories() {
  const el = document.getElementById('catSelect');
  el.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-chip ${c===selectedCat?'active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}
function selectCat(c) { selectedCat = c; renderCategories(); }

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerToggle').textContent = '▶';
    document.getElementById('timerToggle').classList.remove('stop');
    document.getElementById('timerToggle').classList.add('start');
  } else {
    timerInterval = setInterval(() => { timerSeconds++; updateTimerDisplay(); }, 1000);
    timerRunning = true;
    document.getElementById('timerToggle').textContent = '⏸';
    document.getElementById('timerToggle').classList.remove('start');
    document.getElementById('timerToggle').classList.add('stop');
  }
}
function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  updateTimerDisplay();
  document.getElementById('timerToggle').textContent = '▶';
  document.getElementById('timerToggle').classList.remove('stop');
  document.getElementById('timerToggle').classList.add('start');
}
function updateTimerDisplay() {
  const h = Math.floor(timerSeconds/3600);
  const m = Math.floor((timerSeconds%3600)/60);
  const s = timerSeconds%60;
  document.getElementById('timerDisplay').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function saveSession() {
  if (timerSeconds < 60) { showToast('1分以上学習してから保存してください'); return; }
  const mins = Math.round(timerSeconds / 60);
  const d = today();
  if (!studyLogs[d]) studyLogs[d] = [];
  studyLogs[d].push({ cat: selectedCat, mins, time: new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) });
  save('studyLogs', studyLogs);
  resetTimer();
  updateStreak();
  renderTodayLogs();
  renderHome();
  showToast(`${mins}分の${selectedCat}を記録しました！`);
}
function renderTodayLogs() {
  const logs = studyLogs[today()] || [];
  const el = document.getElementById('todayLogs');
  if (logs.length === 0) { el.innerHTML = '<p style="font-size:13px;color:var(--text2)">まだ記録がありません</p>'; return; }
  el.innerHTML = logs.map(l => `
    <div class="schedule-item">
      <div class="schedule-time">${l.time}</div>
      <div class="schedule-content">
        <div class="schedule-name">${l.cat}</div>
        <div class="schedule-dur">${l.mins}分</div>
      </div>
    </div>
  `).join('');
}

// ===== STREAK =====
function updateStreak() {
  const d = today();
  if (streak.lastDate === d) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yd = yesterday.toISOString().slice(0,10);
  if (streak.lastDate === yd) {
    streak.count++;
  } else if (streak.lastDate !== d) {
    streak.count = 1;
  }
  streak.lastDate = d;
  save('streak', streak);
  document.getElementById('streakCount').textContent = streak.count;
  if (streak.count > 0 && streak.count % 7 === 0) {
    showLevelUp(`🔥 ${streak.count}日連続達成！`, '素晴らしい継続力です！');
  }
}

// ===== HOME =====
function renderHome() {
  // Streak
  document.getElementById('streakCount').textContent = streak.count;

  // Motivation
  const mot = MOTIVATION_MSGS[Math.floor(Math.random() * MOTIVATION_MSGS.length)];
  document.getElementById('motEmoji').textContent = mot.emoji;
  document.getElementById('motMsg').textContent = mot.msg;

  // Today mins
  const todayLogs = studyLogs[today()] || [];
  const todayMins = todayLogs.reduce((s,l) => s + l.mins, 0);
  document.getElementById('todayMin').innerHTML = todayMins + '<span style="font-size:16px">分</span>';

  // Goal ring (60min target)
  const pct = Math.min(100, Math.round(todayMins/60*100));
  document.getElementById('goalPct').textContent = pct + '%';
  const offset = 327 - (327 * pct / 100);
  document.getElementById('goalArc').setAttribute('stroke-dashoffset', offset);

  // Week mins
  const now = new Date();
  let weekTotal = 0;
  const weekData = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const logs = studyLogs[ds] || [];
    const m = logs.reduce((s,l) => s + l.mins, 0);
    weekTotal += m;
    weekData.push({day: ['日','月','火','水','木','金','土'][d.getDay()], mins: m, date: ds});
  }
  document.getElementById('weekMin').innerHTML = weekTotal + '<span style="font-size:16px">分</span>';

  // Week chart
  const maxMin = Math.max(60, ...weekData.map(d=>d.mins));
  document.getElementById('weekChart').innerHTML = weekData.map(d => {
    const h = d.mins > 0 ? Math.max(8, d.mins/maxMin*120) : 0;
    const isToday = d.date === today();
    return `<div class="chart-bar-col">
      <div class="chart-val">${d.mins>0?d.mins:''}</div>
      <div class="chart-bar" style="height:${h}px;${isToday?'opacity:1':'opacity:0.6'}"></div>
      <div class="chart-label" style="${isToday?'color:var(--accent);font-weight:700':''}">${d.day}</div>
    </div>`;
  }).join('');

  // Vocab stats
  const allWords = getAllWords();
  const mastered = allWords.filter(w => (vocabState[w.w]?.interval || 0) >= 21).length;
  document.getElementById('vocabMastered').textContent = mastered;
  document.getElementById('vocabTotal').textContent = allWords.length;
  const bar = allWords.length > 0 ? (mastered/allWords.length*100) : 0;
  document.getElementById('homeVocabBar').style.width = bar + '%';

  renderCalendar();
}

// ===== CALENDAR =====
function calNav(dir) {
  calViewDate.setMonth(calViewDate.getMonth() + dir);
  renderCalendar();
}
function renderCalendar() {
  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  document.getElementById('calMonth').textContent = `${y}年${m+1}月`;
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr = today();

  let html = ['日','月','火','水','木','金','土'].map(d => `<div class="cal-day-label">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const logs = studyLogs[ds] || [];
    const mins = logs.reduce((s,l)=>s+l.mins,0);
    let cls = 'cal-day';
    if (ds === todayStr) cls += ' today';
    if (mins > 0) {
      cls += ' has-study';
      if (mins < 30) cls += ' low';
      else if (mins < 60) cls += ' mid';
      else cls += ' high';
    }
    html += `<div class="${cls}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

// ===== SCHEDULE =====
function renderSchedule() {
  const d = today();
  document.getElementById('scheduleDate').textContent = `${new Date().getMonth()+1}月${new Date().getDate()}日（${dayOfWeek(d)}）の予定`;

  // Auto-apply templates
  if (!schedule[d] && templates.length > 0) {
    schedule[d] = templates.map(t => ({...t, done: false}));
    save('schedule', schedule);
  }

  const items = schedule[d] || [];
  const el = document.getElementById('scheduleList');
  if (items.length === 0) { el.innerHTML = '<p style="font-size:13px;color:var(--text2)">予定がありません</p>'; return; }
  el.innerHTML = items.sort((a,b) => a.time.localeCompare(b.time)).map((item, i) => `
    <div class="schedule-item">
      <div class="schedule-time">${item.time}</div>
      <div class="schedule-content">
        <div class="schedule-name">${item.name}</div>
        <div class="schedule-dur">${item.dur}分</div>
      </div>
      <button class="schedule-check ${item.done?'done':''}" onclick="toggleScheduleDone(${i})">${item.done?'✓':''}</button>
    </div>
  `).join('');
}
function toggleScheduleDone(i) {
  const d = today();
  if (schedule[d] && schedule[d][i]) {
    schedule[d][i].done = !schedule[d][i].done;
    save('schedule', schedule);
    renderSchedule();
  }
}
function openScheduleModal() { document.getElementById('scheduleModal').classList.add('show'); }
function openTemplateModal() {
  renderTemplateList();
  document.getElementById('templateModal').classList.add('show');
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function addSchedule() {
  const d = today();
  if (!schedule[d]) schedule[d] = [];
  schedule[d].push({
    time: document.getElementById('schTime').value,
    name: document.getElementById('schName').value || '学習',
    dur: parseInt(document.getElementById('schDur').value) || 30,
    done: false
  });
  save('schedule', schedule);
  closeModal('scheduleModal');
  renderSchedule();
}
function addTemplate() {
  templates.push({
    time: document.getElementById('tplTime').value,
    name: document.getElementById('tplName').value || '学習',
    dur: parseInt(document.getElementById('tplDur').value) || 30
  });
  save('templates', templates);
  renderTemplateList();
  showToast('テンプレートを追加しました');
}
function renderTemplateList() {
  const el = document.getElementById('templateList');
  el.innerHTML = templates.map((t,i) => `
    <div class="schedule-item">
      <div class="schedule-time">${t.time}</div>
      <div class="schedule-content">
        <div class="schedule-name">${t.name}</div>
        <div class="schedule-dur">${t.dur}分</div>
      </div>
      <button style="color:var(--red);font-size:18px" onclick="removeTemplate(${i})">✕</button>
    </div>
  `).join('');
}
function removeTemplate(i) { templates.splice(i,1); save('templates',templates); renderTemplateList(); }

// ===== SPEECH =====
function speakWord(text) {
  const word = text || (currentWord && currentWord.w);
  if (!word) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.9;
  // Try to pick a good English voice
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) u.voice = enVoice;
  speechSynthesis.speak(u);
}
// Preload voices
speechSynthesis.getVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ===== VOCAB =====
function getAllWords() {
  const base = [...VOCAB_DATA[700].map(w=>({...w,lv:700})), ...VOCAB_DATA[800].map(w=>({...w,lv:800}))];
  const custom = customWords.map(w=>({...w}));
  return [...base, ...custom];
}
let vocabStartTime = 0;
let currentWord = null;
let currentSpeed = 4;
let roundWords = [];
let roundIndex = 0;
let roundResults = [];
let countdownTimer = null;

function getDueWords() {
  const all = getAllWords();
  const d = today();
  const due = all.filter(w => {
    const s = vocabState[w.w];
    if (!s) return true;
    return s.nextDate <= d;
  });
  due.sort((a,b) => {
    const sa = vocabState[a.w], sb = vocabState[b.w];
    if (!sa && sb) return -1;
    if (sa && !sb) return 1;
    if (!sa && !sb) return 0;
    return (sa.nextDate||'').localeCompare(sb.nextDate||'');
  });
  return due;
}

function updateVocabStats() {
  const all = getAllWords();
  const mastered = all.filter(w => (vocabState[w.w]?.interval||0) >= 21).length;
  const todayReviewed = Object.values(vocabState).filter(s => s.lastReview === today()).length;
  document.getElementById('vToday').textContent = todayReviewed;
  document.getElementById('vMastered').textContent = mastered;
  document.getElementById('vRemain').textContent = all.length - mastered;
  const lv700 = VOCAB_DATA[700].length;
  const mastered700 = VOCAB_DATA[700].filter(w => (vocabState[w.w]?.interval||0) >= 21).length;
  const badge = document.getElementById('vocabLevelBadge');
  if (mastered700 >= lv700 * 0.8) {
    badge.textContent = 'TOEIC 800'; badge.className = 'vocab-level-badge l800';
  } else {
    badge.textContent = 'TOEIC 700'; badge.className = 'vocab-level-badge l700';
  }
  const bar = all.length > 0 ? (mastered/all.length*100) : 0;
  document.getElementById('vocabBar').style.width = bar + '%';
}

function startRound(speed) {
  currentSpeed = speed;
  const due = getDueWords();
  if (due.length === 0) {
    showToast('今日の単語はすべて完了です！');
    return;
  }
  roundWords = due.slice(0, 10);
  roundIndex = 0;
  roundResults = [];
  document.getElementById('vocabSettings').style.display = 'none';
  document.getElementById('roundResult').style.display = 'none';
  document.getElementById('vocabQuizWrap').style.display = '';
  renderRoundProgress();
  showRoundWord();
}

function renderRoundProgress() {
  const total = roundWords.length;
  let html = '';
  for (let i = 0; i < total; i++) {
    let cls = 'round-dot';
    if (i === roundIndex) cls += ' current';
    else if (i < roundResults.length) {
      const r = roundResults[i];
      cls += r === 2 ? ' done-easy' : r === 1 ? ' done-ok' : ' done-hard';
    }
    html += `<div class="${cls}">${i+1}</div>`;
  }
  document.getElementById('roundProgress').innerHTML = html;
}

function showRoundWord() {
  if (roundIndex >= roundWords.length) {
    finishRound();
    return;
  }
  const w = roundWords[roundIndex];
  currentWord = w;
  vocabStartTime = Date.now();
  document.getElementById('vWord').textContent = w.w;
  document.getElementById('vHint').textContent = w.lv ? `Level: TOEIC ${w.lv}` : '';
  document.getElementById('vAnswer').textContent = w.m;
  document.getElementById('vAnswer').classList.remove('show');
  document.getElementById('vExample').textContent = w.ex || '';
  document.getElementById('vExample').classList.remove('show');
  document.getElementById('vCountdown').textContent = '';
  document.getElementById('vRating').style.display = 'none';
  renderRoundProgress();
  // Speak and start countdown simultaneously
  speakWord(w.w);
  startCountdown(currentSpeed);
}

function startCountdown(seconds) {
  const cdEl = document.getElementById('vCountdown');
  let remaining = seconds;
  cdEl.textContent = remaining;
  cdEl.classList.remove('pulse');
  void cdEl.offsetWidth;
  cdEl.classList.add('pulse');
  countdownTimer = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      cdEl.textContent = remaining;
      cdEl.classList.remove('pulse');
      void cdEl.offsetWidth;
      cdEl.classList.add('pulse');
    } else {
      clearInterval(countdownTimer);
      cdEl.textContent = '';
      document.getElementById('vAnswer').classList.add('show');
      document.getElementById('vExample').classList.add('show');
      document.getElementById('vRating').style.display = 'flex';
    }
  }, 1000);
}

function finishRound() {
  document.getElementById('vocabQuizWrap').style.display = 'none';
  const easy = roundResults.filter(r=>r===2).length;
  const ok = roundResults.filter(r=>r===1).length;
  const hard = roundResults.filter(r=>r===0).length;
  document.getElementById('rrEasy').textContent = easy;
  document.getElementById('rrOk').textContent = ok;
  document.getElementById('rrHard').textContent = hard;
  document.getElementById('roundResult').style.display = '';
  updateVocabStats();
  renderHome();
}

function backToSettings() {
  document.getElementById('roundResult').style.display = 'none';
  document.getElementById('vocabQuizWrap').style.display = 'none';
  document.getElementById('vocabSettings').style.display = '';
  updateVocabStats();
}

function showNextWord() {
  updateVocabStats();
  document.getElementById('vocabSettings').style.display = '';
  document.getElementById('vocabQuizWrap').style.display = 'none';
  document.getElementById('roundResult').style.display = 'none';
}

function rateWord(rating) {
  if (!currentWord) return;
  const w = currentWord.w;
  const elapsed = (Date.now() - vocabStartTime)/1000;

  if (!vocabState[w]) {
    vocabState[w] = { interval: 0, nextDate: today(), ease: 2.5, speeds: [], lastReview: today() };
  }
  const s = vocabState[w];
  s.lastReview = today();
  s.speeds.push(elapsed);
  if (s.speeds.length > 10) s.speeds.shift();

  if (rating === 0) {
    s.interval = 1;
    s.ease = Math.max(1.3, s.ease - 0.3);
  } else if (rating === 1) {
    s.interval = s.interval === 0 ? 1 : Math.round(s.interval * s.ease);
    s.ease = Math.max(1.3, s.ease - 0.1);
  } else {
    s.interval = s.interval === 0 ? 3 : Math.round(s.interval * s.ease * 1.2);
    s.ease = Math.min(3.0, s.ease + 0.1);
  }

  const next = new Date();
  next.setDate(next.getDate() + s.interval);
  s.nextDate = next.toISOString().slice(0,10);
  save('vocabState', vocabState);

  // Track round result
  roundResults.push(rating);
  roundIndex++;

  // Check level up
  const all700 = VOCAB_DATA[700];
  const mastered700 = all700.filter(w => (vocabState[w.w]?.interval||0) >= 21).length;
  if (mastered700 === all700.length) {
    showLevelUp('🎉 TOEIC 700レベル完了！', 'TOEIC 800レベルに挑戦しましょう！');
  }

  showRoundWord();
}

function toggleVocabAdd() {
  const f = document.getElementById('vocabAddForm');
  f.style.display = f.style.display === 'none' ? '' : 'none';
}
function addCustomWord() {
  const w = document.getElementById('vaWord').value.trim();
  const m = document.getElementById('vaMeaning').value.trim();
  if (!w || !m) { showToast('単語と意味を入力してください'); return; }
  customWords.push({
    w, m,
    ex: document.getElementById('vaExample').value.trim(),
    lv: parseInt(document.getElementById('vaLevel').value)
  });
  save('customWords', customWords);
  document.getElementById('vaWord').value = '';
  document.getElementById('vaMeaning').value = '';
  document.getElementById('vaExample').value = '';
  showToast(`「${w}」を追加しました`);
  showNextWord();
}

// ===== UTILS =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function showLevelUp(text, sub) {
  document.getElementById('levelupText').textContent = text;
  document.getElementById('levelupSub').textContent = sub;
  document.getElementById('levelupOverlay').classList.add('show');
  setTimeout(() => document.getElementById('levelupOverlay').classList.remove('show'), 3000);
}

// ===== INIT =====
function init() {
  // Check streak continuity
  if (streak.lastDate && streak.lastDate !== today()) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate()-1);
    if (streak.lastDate !== yesterday.toISOString().slice(0,10)) {
      streak.count = 0;
      save('streak', streak);
    }
  }

  renderCategories();
  renderHome();
  renderTodayLogs();
  renderSchedule();
  showNextWord();
}
init();
</script>
